<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Art Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Virtual Art Gallery</h1>
    </header>
    <main>
        <section class="hero">
            <div class="hero-inner">
                <h2>Curated Highlights</h2>
                <p>Explore a refreshed selection of artwork — click any piece for details.</p>

                <div class="quote-wrapper">
                    <h3>Inspirational Quote</h3>
                    <div id="quote-widget" class="quote-widget" aria-live="polite"></div>
                </div>
            </div>
        </section>

        <section class="gallery" id="gallery" aria-label="Art gallery">
            <!-- Gallery items are rendered dynamically from data.js -->
        </section>

        <!-- Accessible modal for artwork details -->
        <div class="modal" id="artModal" role="dialog" aria-modal="true" aria-hidden="true">
            <div class="modal-panel" role="document">
                <button class="modal-close" id="modalClose" aria-label="Close details">×</button>
                <div class="modal-content" id="modalContent"></div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 Virtual Art Gallery. All rights reserved.</p>
    </footer>
    <script type="module" src="InspirationalQuote.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
